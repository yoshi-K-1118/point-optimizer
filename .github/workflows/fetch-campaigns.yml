name: キャンペーンデータ更新

on:
  schedule:
    # 毎日 09:00 JST (= 00:00 UTC) に実行
    - cron: '0 0 * * *'
  workflow_dispatch:  # 手動実行も可能

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: キャンペーンデータを取得
        run: node scripts/fetch-campaigns.js
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_GID: ${{ secrets.GOOGLE_SHEET_GID }}

      - name: 変更があればコミット & プッシュ
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/data/campaigns.json
          git diff --staged --quiet && echo "変更なし" || (
            git commit -m "chore: update campaigns data" &&
            git push
          )
